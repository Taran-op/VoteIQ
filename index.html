  <!-- Google Analytics 4 -->

  <script>

  <!-- Styled trigger button -->
  <button id="translate-btn"
    onclick="document.getElementById('google_translate_element').style.display='block'; this.style.display='none';"

    font-size: 0.78rem; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer; transition: background 0.2s, transform 0.2s;
  " onmouseover="this.style.background='#e8c97a';this.style.transform='translateY(-1px)'"
    onmouseout="this.style.background='#c9a84c';this.style.transform='translateY(0)'">🌐 Translate</button>

  <style>
    .goog-te-gadget .goog-te-combo {
